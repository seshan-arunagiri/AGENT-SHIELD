version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aegis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis_dev_password
      POSTGRES_DB: aegis
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aegis-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Database connection (points to postgres service)
      DATABASE_URL: postgresql://aegis:aegis_dev_password@postgres:5432/aegis?schema=public
      # Application environment variables from .env file
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      AEGIS_CI_TOKEN: ${AEGIS_CI_TOKEN:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env

volumes:
  postgres_data:
    driver: local
